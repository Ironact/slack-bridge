name: Notify PR Approved

on:
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d message_thread_id="6464" \
            -d parse_mode="Markdown" \
            -d text="✅ *PR #${{ github.event.pull_request.number }} Approved!*%0A${{ github.event.review.user.login }} approved: [${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})%0A👉 Ready to merge!"
